<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Home Tutor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link th:href="@{/Assets/css/style-signup.css}" type="text/css" rel="stylesheet">

</head>

<body>
  <div aria-live="polite" aria-atomic="true">
    <div class="toast-container position-fixed top-0 start-50 translate-middle-x p-3" style="z-index: 1055;">
      <div th:if="${error}" class="toast align-items-center text-bg-danger border-0 show" role="alert"
        aria-live="assertive" aria-atomic="true" id="messageToast" data-bs-delay="5000" data-bs-autohide="true">
        <div class="toast-header">
          <strong class="me-auto">Error:</strong>
          <small class="text-muted"><span id="countdown">10</span>s</small>
          <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
        <div class="toast-body">
          <p>[[${error}]]</p>
        </div>
      </div>
    </div>
  </div>

  <div class="container d-flex justify-content-center align-items-center">
    <div class="signup-wrapper">
      <div class="signup-image">
        <img src="Assets/img/login-pic.png" alt="Sign Up Image">
      </div>
      <div class="signup-form">

        <h2 class="signup-title">Create an Account</h2>

        <div th:if="${param.success}" class="alert alert-success">
          Registration successful! You can now login.
        </div>
        <div th:if="${param.error}" class="alert alert-danger" th:text="${param.error}"></div>

        <form th:action="@{/signup}" method="post">
          <div class="mb-3 input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" class="form-control" name="name" placeholder="Full Name" required />
          </div>
          <div class="mb-3 input-group">
            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
            <input type="email" class="form-control" name="email" placeholder="Email" required />
          </div>
          <div class="mb-3 input-group">
            <span class="input-group-text"><i class="fas fa-phone"></i></span>
            <input type="tel" class="form-control" name="phoneNumber" placeholder="Phone Number" required />
          </div>
          <div class="mb-3 input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control" name="password" placeholder="Password" required />
          </div>
          <div class="mb-4 input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control" name="confirmPassword" placeholder="Confirm Password"
              required />
          </div>

          <button type="submit" class="btn signup-btn w-100">Sign Up</button>
        </form>

        <p class="login-link">Already have an account? <a th:href="@{/login}">Login</a></p>
      </div>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const toastEl = document.getElementById('messageToast');
      const countdownEl = document.getElementById('countdown');
      let secondsLeft = 10;

      const interval = setInterval(() => {
        console.log(secondsLeft + "time left");
        secondsLeft--;
        if (secondsLeft >= 0) {
          countdownEl.textContent = secondsLeft;
        }
        if (secondsLeft <= 0) {
          clearInterval(interval);
          if (toastEl) {
            toastEl.classList.remove('show');
          }
        }
      }, 1000);
    });
  </script>
</body>

</html>
