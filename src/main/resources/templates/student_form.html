<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{main_layout.html}">
<head>

    <title th:text="${student.studentId != null ? 'Update Student - ' + student.studentName : 'Add a Student'}">Add a
        Student</title>



</head>

<body>
    <div class="content-body">
        <div class="container-fluid" layout:fragment="content">
            <div class="col-xl-12">
                <div class="card">
                    <div class="card-header border-0 p-3">
                        <h4 class="heading mb-0"
                            th:text="${student.studentId != null ? 'Update Student - ' + student.studentName : 'Add a Student'}">
                        </h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/students/save}" method="post" th:object="${student}"
                            style="max-width: 400px; margin: 0 auto">

                            <input type="hidden" th:field="*{teacher}" />
                            <input type="hidden" th:field="*{studentId}" />

                            <div class="border p-3">
                                <div class="form-group row mb-3">
                                    <label class="col-sm-4 col-form-label">Full Name</label>
                                    <div class="col-sm-8">
                                        <input type="text" th:field="*{studentName}" class="form-control" required
                                            minlength="4" />
                                    </div>
                                </div>

                                <div class="form-group row mb-3">
                                    <label class="col-sm-4 col-form-label">Entry Date</label>
                                    <div class="col-sm-8">
                                        <input id="entryDate" type="date" th:field="*{entryDate}" class="form-control"
                                            required />
                                    </div>
                                </div>

                                <div class="form-group row mb-3">
                                    <label class="col-sm-4 col-form-label">Parent Number</label>
                                    <div class="col-sm-8">
                                        <input type="tel" th:field="*{parentNumber}" class="form-control" required
                                            maxlength="10" pattern="[0-9]{10}" />
                                    </div>
                                </div>

                                <div class="text-center">
                                    <button type="submit" class="btn btn-primary m-2">Save</button>
                                    <button type="button" class="btn btn-secondary m-2"
                                        th:onclick="'window.location.href=\'' + @{/students} + '\';'">
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <th:block layout:fragment="scripts">
        <script th:inline="javascript">
            window.onload = function () {
                const studentId = /*[[${student.studentId}]]*/ '';
                if (!studentId) {
                    document.querySelector('input[type="date"]').valueAsDate = new Date();
                }
            }
        </script>
    </th:block>

</body>

</html>
