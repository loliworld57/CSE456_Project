<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Home Tutor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link th:href="@{/Assets/css/style-login.css}" type="text/css" rel="stylesheet">

</head>

<body>
  <div aria-live="polite" aria-atomic="true" class="position-relative">
    <div class="toast-container position-fixed bot-0 end-0 p-3">
      <div th:if="${error}" class="toast align-items-center text-bg-danger border-0 show" role="alert"
        aria-live="assertive" aria-atomic="true" id="messageToast" data-bs-delay="5000" data-bs-autohide="true">
        <div class="toast-header">
          <strong class="me-auto">Error:</strong>
          <small class="text-muted"><span id="countdown">5</span>s</small>
          <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
        <div class="toast-body">
          <p>[[${error}]]</p>
        </div>
      </div>
    </div>
  </div>
  <div class="login-wrapper row">
    <div class="login-image">
      <img src="Assets/img/login-pic.png" alt="Login Image" class="login-img">
    </div>

    <div class="login-form">
      <div class="text-center">
        <h2 class="login-title">Welcome Back</h2>
      </div>

      <div th:if="${param.error}" class="alert alert-danger">
        <i class="fas fa-exclamation-circle me-1"></i> Invalid username or password
      </div>
      <div th:if="${param.logout}" class="alert alert-success">
        <i class="fas fa-check-circle me-1"></i> You have been logged out
      </div>
      <div th:if="${param.error == 'disabled'}" class="alert alert-danger">
        <i class="fas fa-check-circle me-1"></i> Your account has been disabled.
      </div>

      <form th:action="@{/login}" method="post">
        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="fas fa-user"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Email or phone" required>
        </div>
        <div class="mb-4 input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>
        <button type="submit" class="btn login-btn w-100 text-white">Login</button>
      </form>

      <div class="text-center signup-link">
        Don't have an account? <a th:href="@{/signup}">Sign up</a>
      </div>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const toastEl = document.getElementById('messageToast');
      const countdownEl = document.getElementById('countdown');
      let secondsLeft = 5;

      const interval = setInterval(() => {
        console.log(secondsLeft + "time left");
        secondsLeft--;
        if (secondsLeft >= 0) {
          countdownEl.textContent = secondsLeft;
        }
        if (secondsLeft <= 0) {
          clearInterval(interval);
          if (toastEl) {
            toastEl.classList.remove('show');
          }
        }
      }, 1000);
    });
  </script>
</body>

</html>
