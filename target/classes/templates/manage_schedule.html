<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{main_layout.html}">

<head>
    <title>Schedule</title>
</head>

<body>
    <div class="container-fluid" layout:fragment="content">
        <div class="col-xl-12">
            <div class="card">
                <div class="card-body">
                    <div class="card-header border-0 p-3">
                        <h1>Time Table</h1>
                        <div class="m-3">
                            <button type="button" class="btn btn-primary" data-bs-toggle="modal"
                                data-bs-target="#scheduleModal">
                                <i class="fa-solid fa-calendar-plus"></i> Add New
                            </button>
                        </div>

                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive basic-tbl">
                            <table class="table table-bordered showlist" style="min-width: 845px">
                                <thead class="bg-dark">
                                    <tr class="text-secondary">
                                        <th>Schedule ID</th>
                                        <th>Course ID</th>
                                        <th>Course Name</th>
                                        <th>Day</th>
                                        <th>Start Time</th>
                                        <th>End Time</th>
                                        <th>Periods</th>
                                        <th class="text-center">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="schedule : ${schedules}">
                                        <td>[[${schedule.id}]]</td>
                                        <td>[[${schedule.course.courseId}]]</td>
                                        <td>[[${schedule.course.courseName}]]</td>
                                        <td>[[${schedule.dayOfWeek}]]</td>
                                        <td th:text="${#temporals.format(schedule.startTime, 'H:mm')}"></td>
                                        <td th:text="${#temporals.format(schedule.endTime, 'H:mm')}"></td>
                                        <td th:text="${schedule.periods}"></td>
                                        <td class="text-center">
                                            <button type="button" class="btn btn-secondary btn-sm"
                                                th:onclick="'showUpdateModal(' + ${schedule.id} + ')'">
                                                <i class="fa-solid fa-gear"></i>
                                            </button>
                                            <form th:action="@{/schedule/delete/{id}(id=${schedule.id})}" method="post"
                                                style="display: inline;">
                                                <button type="button" class="btn btn-danger btn-sm"
                                                    onclick="showConfirmModal(this)">
                                                    <i class="fa-solid fa-calendar-xmark"></i>
                                                </button>
                                            </form>

                                        </td>
                                    </tr>
                                </tbody>
                            </table>

                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal fade" id="scheduleModal" tabindex="-1" aria-labelledby="scheduleModalLabel"
            aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="scheduleModalLabel">Add Schedule</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="scheduleForm" th:action="@{/schedule/add}" method="post">
                            <div class="mb-3">
                                <label for="scheduleModal" class="form-label">Course</label>
                                <select class="form-select" name="courseId" id="courseId" required>
                                    <option value="">Select Course</option>
                                    <option th:each="course : ${courses}" th:value="${course.courseId}"
                                        th:text="${course.courseId + ' - ' + course.courseName}">
                                    </option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="dayOfWeek" class="form-label">Day</label>
                                <select class="form-select" name="dayOfWeek" id="dayOfWeek" required>
                                    <option value="">Select Day</option>
                                    <option value="MONDAY">Monday</option>
                                    <option value="TUESDAY">Tuesday</option>
                                    <option value="WEDNESDAY">Wednesday</option>
                                    <option value="THURSDAY">Thursday</option>
                                    <option value="FRIDAY">Friday</option>
                                    <option value="SATURDAY">Saturday</option>
                                    <option value="SUNDAY">Sunday</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="startTime" class="form-label">Start Time</label>
                                <select class="form-select" name="startTime" id="startTime" required>
                                    <option value="">Select Time</option>
                                    <option value="07:30">07:30</option>
                                    <option value="08:30">08:30</option>
                                    <option value="09:30">09:30</option>
                                    <option value="10:30">10:30</option>
                                    <option value="11:30">11:30</option>
                                    <option value="12:30">12:30</option>
                                    <option value="13:30">13:30</option>
                                    <option value="14:30">14:30</option>
                                    <option value="15:30">15:30</option>
                                    <option value="16:30">16:30</option>
                                    <option value="17:30">17:30</option>
                                    <option value="18:30">18:30</option>
                                    <option value="19:30">19:30</option>
                                    <option value="20:30">20:30</option>
                                    <option value="21:30">21:30</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="periods" class="form-label">Number of Periods</label>
                                <input type="number" class="form-control" name="periods" id="periods" min="1" max="14"
                                    step="0.5" required>
                            </div>
                            <div class="mb-3">
                                <small class="text-muted" id="endTimeDisplay"></small>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                <button type="submit" class="btn btn-primary">Add Schedule</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal fade" id="updateScheduleModal" tabindex="-1" aria-labelledby="updateScheduleModalLabel"
            aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="updateScheduleModalLabel">Update Schedule</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="updateScheduleForm" th:action="@{'/schedule/update/' + ${updateScheduleId}}"
                            method="post">
                            <input type="hidden" id="updateScheduleId" name="id">
                            <div class="mb-3">
                                <label for="updateCourseId" class="form-label">Course</label>
                                <select class="form-select" name="courseId" id="updateCourseId" required>
                                    <option value="">Select Course</option>
                                    <option th:each="course : ${courses}" th:value="${course.courseId}"
                                        th:text="${course.courseId + ' - ' + course.courseName}">
                                    </option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="updateDayOfWeek" class="form-label">Day</label>
                                <select class="form-select" name="dayOfWeek" id="updateDayOfWeek" required>
                                    <option value="">Select Day</option>
                                    <option value="MONDAY">Monday</option>
                                    <option value="TUESDAY">Tuesday</option>
                                    <option value="WEDNESDAY">Wednesday</option>
                                    <option value="THURSDAY">Thursday</option>
                                    <option value="FRIDAY">Friday</option>
                                    <option value="SATURDAY">Saturday</option>
                                    <option value="SUNDAY">Sunday</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="updateStartTime" class="form-label">Start Time</label>
                                <select class="form-select" name="startTime" id="updateStartTime" required>
                                    <option value="">Select Time</option>
                                    <option value="07:30">07:30</option>
                                    <option value="08:30">08:30</option>
                                    <option value="09:30">09:30</option>
                                    <option value="10:30">10:30</option>
                                    <option value="11:30">11:30</option>
                                    <option value="12:30">12:30</option>
                                    <option value="13:30">13:30</option>
                                    <option value="14:30">14:30</option>
                                    <option value="15:30">15:30</option>
                                    <option value="16:30">16:30</option>
                                    <option value="17:30">17:30</option>
                                    <option value="18:30">18:30</option>
                                    <option value="19:30">19:30</option>
                                    <option value="20:30">20:30</option>
                                    <option value="21:30">21:30</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="updatePeriods" class="form-label">Number of Periods</label>
                                <input type="number" class="form-control" name="periods" id="updatePeriods" min="1"
                                    max="14" step="0.5" required>
                            </div>
                            <div class="mb-3">
                                <small class="text-muted" id="updateEndTimeDisplay"></small>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                <button type="submit" class="btn btn-primary">Update Schedule</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header bg-danger text-white">
                        <h5 class="modal-title" id="confirmModalLabel">Confirm Delete Schedule</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        Are you sure you want to delete this schedule?
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-danger" onclick="submitDeleteForm()">Yes, Delete</button>
                    </div>
                </div>
            </div>
        </div>
</body>

<th:block layout:fragment="scripts">
    <script th:inline="javascript">
        // Define functions first, outside of any event handlers
        function updateEndTimeDisplay(prefix = '') {
            const startTimeId = prefix ? prefix + 'StartTime' : 'startTime';
            const periodsId = prefix ? prefix + 'Periods' : 'periods';
            const displayId = prefix ? prefix + 'EndTimeDisplay' : 'endTimeDisplay';

            const startTime = document.getElementById(startTimeId).value;
            const periods = parseFloat(document.getElementById(periodsId).value) || 0;

            if (startTime && periods) {
                const [hours, minutes] = startTime.split(':').map(Number);
                const endHour = hours + Math.floor(periods);
                const endMinutes = minutes;

                if (endHour > 21 || (endHour === 21 && endMinutes > 30)) {
                    document.getElementById(displayId).textContent = 'Warning: Schedule ends after 21:30';
                    document.getElementById(displayId).classList.add('text-danger');
                } else {
                    const formattedEndHour = String(endHour).padStart(2, '0');
                    const formattedEndMinutes = String(endMinutes).padStart(2, '0');
                    document.getElementById(displayId).textContent =
                        `End Time: ${formattedEndHour}:${formattedEndMinutes}`;
                    document.getElementById(displayId).classList.remove('text-danger');
                }
            }
        }

        function showUpdateModal(scheduleId) {
            console.log('Fetching schedule with ID:', scheduleId);

            fetch(`/schedule/get/${scheduleId}`)
                .then(response => {
                    console.log('Response status:', response.status);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('Received data:', data);

                    // Populate form fields
                    document.getElementById('updateScheduleId').value = scheduleId;
                    document.getElementById('updateCourseId').value = data.courseId;
                    document.getElementById('updateDayOfWeek').value = data.dayOfWeek;
                    document.getElementById('updateStartTime').value = data.startTime;
                    document.getElementById('updatePeriods').value = data.periods;

                    // Update end time display
                    updateEndTimeDisplay('update');

                    // Show modal
                    const updateModal = new bootstrap.Modal(document.getElementById('updateScheduleModal'));
                    updateModal.show();
                })
                .catch(error => {
                    console.error('Error details:', error);
                    alert('Error loading schedule data: ' + error.message);
                });
        }

        // DOM ready event handler
        document.addEventListener('DOMContentLoaded', function () {
            // Add Schedule form handling
            const scheduleForm = document.getElementById('scheduleForm');
            const scheduleModal = new bootstrap.Modal(document.getElementById('scheduleModal'));

            if (scheduleForm) {
                scheduleForm.addEventListener('submit', function (e) {
                    e.preventDefault();
                    const startTime = document.getElementById('startTime').value;
                    const periods = parseFloat(document.getElementById('periods').value);

                    const [hours, minutes] = startTime.split(':').map(Number);
                    const startHour = hours + (minutes / 60);
                    const endHour = startHour + periods;

                    if (endHour > 21.5) {
                        alert('Schedule cannot end after 21:30. Please adjust start time or periods.');
                        return;
                    }

                    this.submit();
                    scheduleModal.hide();
                });

                // Add listeners for add form
                document.getElementById('startTime').addEventListener('change',
                    () => updateEndTimeDisplay());
                document.getElementById('periods').addEventListener('input',
                    () => updateEndTimeDisplay());
            }

            // Update form handling
            const updateForm = document.getElementById('updateScheduleForm');
            if (updateForm) {
                updateForm.addEventListener('submit', function (e) {
                    e.preventDefault();
                    const startTime = document.getElementById('updateStartTime').value;
                    const periods = parseFloat(document.getElementById('updatePeriods').value);

                    const [hours, minutes] = startTime.split(':').map(Number);
                    const startHour = hours + (minutes / 60);
                    const endHour = startHour + periods;

                    if (endHour > 21.5) {
                        alert('Schedule cannot end after 21:30. Please adjust start time or periods.');
                        return;
                    }

                    this.submit();
                });

                // Add listeners for update form
                document.getElementById('updateStartTime').addEventListener('change',
                    () => updateEndTimeDisplay('update'));
                document.getElementById('updatePeriods').addEventListener('input',
                    () => updateEndTimeDisplay('update'));
            }
        });
        let deleteForm = null;

        function showConfirmModal(button) {
            deleteForm = button.closest('form');
            const modal = new bootstrap.Modal(document.getElementById('confirmModal'));
            modal.show();
        }

        function submitDeleteForm() {
            if (deleteForm) {
                deleteForm.submit();
            }
        }
    </script>
</th:block>

</html>
